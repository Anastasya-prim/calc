<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор стоимости корпусной мебели (V7)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calc-wrapper">
  <main class="calculator">
    <h1>Калькулятор стоимости корпусной мебели</h1>

    <!-- Размеры в сантиметрах (ширина × высота × глубина) -->
    <div class="input-group">
      <label for="width">Ширина (см)</label>
      <input type="number" id="width" min="1" step="0.1" placeholder="Например: 80">
    </div>

    <div class="input-group">
      <label for="height">Высота (см)</label>
      <input type="number" id="height" min="1" step="0.1" placeholder="Например: 200">
    </div>

    <div class="input-group">
      <label for="depth">Глубина (см)</label>
      <input type="number" id="depth" min="1" step="0.1" placeholder="Например: 60">
    </div>

    <!-- Материал определяет цену за 1 дм³ (ДСП 150, МДФ 250, Массив 500 ₽) -->
    <div class="input-group">
      <label for="material">Материал</label>
      <select id="material">
        <option value="150">ДСП (150 ₽/дм³)</option>
        <option value="250">МДФ (250 ₽/дм³)</option>
        <option value="500">Массив (500 ₽/дм³)</option>
      </select>
    </div>

    <!-- Доп. опции: фиксированная цена добавляется к итогу -->
    <div class="input-group options-group">
      <label>Доп. опции</label>
      <label class="option-item"><input type="checkbox" class="option" data-price="5000"> Стеклянная дверца (+5 000 ₽)</label>
      <label class="option-item"><input type="checkbox" class="option" data-price="2000"> Обувница (+2 000 ₽)</label>
      <label class="option-item"><input type="checkbox" class="option" data-price="3000"> Подсветка (+3 000 ₽)</label>
    </div>

    <button type="button" id="calcBtn">Рассчитать стоимость</button>

    <!-- Блок для отображения результата -->
    <div class="result" id="result"></div>
  </main>

  <aside class="breakdown" id="breakdown">
    <h3 class="breakdown-title">Итоговая сводка (детализация расчёта)</h3>
    <div class="breakdown-content" id="breakdownContent"></div>
  </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
