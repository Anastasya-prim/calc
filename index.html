<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор стоимости корпусной мебели (V2)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="calculator">
    <h1>Калькулятор стоимости корпусной мебели</h1>

    <!-- Поля ввода размеров в сантиметрах -->
    <div class="input-group">
      <label for="width">Ширина (см)</label>
      <input type="number" id="width" min="1" step="0.1" placeholder="Например: 80">
    </div>

    <div class="input-group">
      <label for="height">Высота (см)</label>
      <input type="number" id="height" min="1" step="0.1" placeholder="Например: 200">
    </div>

    <div class="input-group">
      <label for="depth">Глубина (см)</label>
      <input type="number" id="depth" min="1" step="0.1" placeholder="Например: 60">
    </div>

    <!-- Выбор материала: коэффициент цены за дм³ -->
    <div class="input-group">
      <label for="material">Материал</label>
      <select id="material">
        <option value="150">ДСП (150 ₽/дм³)</option>
        <option value="250">МДФ (250 ₽/дм³)</option>
        <option value="500">Массив (500 ₽/дм³)</option>
      </select>
    </div>

    <button type="button" id="calcBtn">Рассчитать стоимость</button>

    <!-- Блок для отображения результата -->
    <div class="result" id="result"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
